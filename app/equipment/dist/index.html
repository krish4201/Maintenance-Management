<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>App Title</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
        .homeNavButton {
            position: fixed;
            z-index: 1000;
            top: 0.65rem;
            left: 0.75rem;
            min-height: 2.25rem;
            padding: 0 0.875rem;
            border: 1px solid #bcc7d1;
            border-radius: 0.375rem;
            background: #fff;
            color: #0a6ed1;
            font: 0.875rem Arial, sans-serif;
            box-shadow: 0 0.125rem 0.5rem rgba(34, 53, 72, 0.14);
            cursor: pointer;
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.148.1/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resource-roots='{
            "maintenance.equipment.equipment": "./"
        }'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="trusted"
    ></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <button class="homeNavButton" type="button" onclick="window.location.href = window.location.pathname.includes('maintenance.equipment.equipment') ? '/maintenance.home/index.html' : '/maintenancehome/index.html'">Home</button>
    <div
        data-sap-ui-component
        data-name="maintenance.equipment.equipment"
        data-id="container"
        data-settings='{"id" : "maintenance.equipment.equipment"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
