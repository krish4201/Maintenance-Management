<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signed Out</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      align-items: center;
      background: #f5f6f7;
      color: #1d2d3e;
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
    }

    main {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 0.5rem;
      box-shadow: 0 0.125rem 0.75rem rgba(0, 0, 0, 0.12);
      max-width: 24rem;
      padding: 2rem;
      text-align: center;
      width: calc(100% - 2rem);
    }

    h1 {
      color: #0a6ed1;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }

    p {
      margin: 0 0 1.5rem;
    }

    a {
      background: #0a6ed1;
      border-radius: 0.375rem;
      color: #fff;
      display: inline-block;
      padding: 0.7rem 1.5rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Signed Out</h1>
    <p>Your maintenance session has ended.</p>
    <a href="/">Sign In Again</a>
  </main>
</body>
</html>
